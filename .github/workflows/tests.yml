name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (secrets detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy (vulnerability scanner)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Semgrep (SAST scanner)
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets

  nix-build:
    name: Nix Build (${{ matrix.config }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - automationd  # macOS (nix-darwin)
          - jump         # NixOS
          - devbox       # home-manager
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: nix-community
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true

      - name: Check flake
        run: nix flake check --no-build

      - name: Build darwinConfigurations.automationd (dry-run)
        if: matrix.config == 'automationd'
        run: |
          nix build .#darwinConfigurations.automationd.system \
            --dry-run \
            --show-trace

      - name: Build nixosConfigurations.jump (dry-run)
        if: matrix.config == 'jump'
        run: |
          nix build .#nixosConfigurations.jump.config.system.build.toplevel \
            --dry-run \
            --show-trace

      - name: Build homeConfigurations.devbox
        if: matrix.config == 'devbox'
        run: |
          nix build .#homeConfigurations.devbox.activationPackage \
            --show-trace

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Check Nix formatting
        run: |
          nix fmt -- --check .
